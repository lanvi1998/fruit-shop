<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thanh Toán - Fruit Shop</title>
<style>
/* BODY */
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #f0f2f5;
  margin:0; padding:0;
}
/* HEADER / FOOTER */
header, footer {
  background:#145b1e;
  color:white;
  text-align:center;
  padding:15px 20px;
}
header h1 { margin:0; font-size:24px; }
footer { margin-top:40px; }

/* CONTAINER */
.container {
  max-width:900px;
  margin:20px auto;
  background:#fff;
  padding:20px;
  border-radius:12px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* CART */
.cart-summary { margin-bottom:20px; border-bottom:1px solid #e0f0d9; padding-bottom:15px; }
.cart-item { display:flex; align-items:center; margin-bottom:10px; background:#f7fff0; padding:10px; border-radius:8px; transition:0.3s; }
.cart-item:hover { background:#e1f0c4; }
.cart-item img { width:70px; height:70px; object-fit:cover; margin-right:12px; border-radius:8px; border:1px solid #d4e8a2; }
.cart-info { flex:1; }
.cart-info p { margin:3px 0; font-size:14px; color:#333; }
.total-price { text-align:right; font-weight:bold; margin-top:10px; font-size:16px; color:#145b1e; }

/* FORM */
form { display:flex; flex-direction:column; gap:12px; }
form label { font-weight:bold; color:#333; }
form input { padding:10px; border-radius:8px; border:1px solid #ccc; font-size:14px; width:100%; }
form input:focus { outline:none; border-color:#145b1e; box-shadow:0 0 5px rgba(20,91,30,0.5); }
form button {
  background:#145b1e;
  color:white;
  padding:12px;
  border:none;
  border-radius:25px;
  font-size:16px;
  cursor:pointer;
  margin-top:10px;
  transition:0.3s;
}
form button:hover { background:#0d4014; }

.back-btn { display:inline-block; text-decoration:none; color:white; background:#78bc16; padding:8px 15px; border-radius:25px; margin-bottom:15px; transition:0.3s; }
.back-btn:hover { background:#4e8c0b; }
</style>
</head>
<body>

<header>
  <h1>Thanh Toán - Fruit Shop</h1>
</header>

<div class="container">
  <a href="cart.html" class="back-btn">← Quay về giỏ hàng</a>

  <div class="cart-summary" id="cart-summary"></div>

  <form id="checkout-form">
    <label for="name">Họ và tên</label>
    <input type="text" id="name" required>
    <label for="phone">Số điện thoại</label>
    <input type="tel" id="phone" required>
    <label for="email">Email</label>
    <input type="email" id="email" required>
    <label for="address">Địa chỉ nhận hàng</label>
    <input type="text" id="address" required>
    <button type="submit">Xác Nhận Đơn Hàng</button>
  </form>
</div>

<footer>© 2026 Fruit Shop | 103 Lạc Long Quân | 0909xxx</footer>

<script>
// ===== CẤU HÌNH =====
const API_URL = "http://localhost:3000"; // Thay server của bạn
const summary = document.getElementById("cart-summary");
const urlParams = new URLSearchParams(window.location.search);
const isBuyNow = urlParams.get("buyNow");

// ===== HÀM LẤY GIỎ HÀNG =====
function getCart() {
    return JSON.parse(localStorage.getItem("cart") || "[]");
}

// ===== LOAD GIỎ HÀNG HOẶC MUA NGAY =====
let orders = [];

if(isBuyNow){
    const buyNowOrder = JSON.parse(localStorage.getItem("buyNowOrder") || "{}");
    if(buyNowOrder.id) orders.push(buyNowOrder);
}else{
    orders = getCart();
}

// ===== HIỂN THỊ GIỎ HÀNG =====
function renderCartSummary() {
    summary.innerHTML = "";
    if(orders.length === 0){
        summary.innerHTML = "<p>Giỏ hàng trống!</p>";
        return;
    }

    let total = 0;
    orders.forEach(p => {
        const itemTotal = p.price * p.qty;
        total += itemTotal;

        const div = document.createElement("div");
        div.className = "cart-item";
        div.innerHTML = `
            <img src="${p.image}" alt="${p.name}">
            <div class="cart-info">
                <p>${p.name} x ${p.qty}</p>
                <p>Thành tiền: ${itemTotal.toLocaleString()} VND</p>
            </div>
        `;
        summary.appendChild(div);
    });

    const totalDiv = document.createElement("div");
    totalDiv.className = "total-price";
    totalDiv.innerText = "Tổng tiền: " + total.toLocaleString() + " VND";
    summary.appendChild(totalDiv);

    // Xóa order tạm nếu mua ngay
    if(isBuyNow) localStorage.removeItem("buyNowOrder");
}

renderCartSummary();

// ===== XỬ LÝ SUBMIT FORM =====
const form = document.getElementById("checkout-form");
const submitBtn = form.querySelector("button");

form.addEventListener("submit", function(e){
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const email = document.getElementById("email").value.trim();
    const address = document.getElementById("address").value.trim();

    if(orders.length === 0){ alert("Giỏ hàng trống!"); return; }
    if(!name || !phone || !email || !address){ alert("Vui lòng điền đầy đủ thông tin"); return; }

    let total = 0;
    orders.forEach(p => total += p.price * p.qty);

    // khóa nút
    submitBtn.disabled = true;
    submitBtn.innerText = "Đang xử lý...";

    // lưu localStorage cho confirm.html
    localStorage.setItem("lastOrder", JSON.stringify({
        name, phone, email, address, total, cart: orders
    }));

    if(!isBuyNow) localStorage.removeItem("cart");

    // redirect ngay
    window.location.href = "confirm.html";

    // gửi server async
    fetch(`${API_URL}/api/order`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({name, phone, email, address, total, cart: orders})
    })
    .then(res => res.json())
    .then(data => console.log("Order gửi server:", data))
    .catch(err => console.error("Gửi order lỗi:", err));
});
</script>

</body>
</html>
