<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Fruit Shop</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    /* HEADER */
    header {
      background: #4CAF50;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
    }

    nav {
      background: #66bb6a;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    /* SECTION */
    .section {
      padding: 20px;
    }

    .title {
      color: green;
      border-left: 5px solid green;
      padding-left: 10px;
      margin-bottom: 10px;
    }

    /* GRID */
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
    }

    .card {
      width: 200px;
      background: white;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
    }

    .card h3 {
      font-size: 16px;
      margin: 10px 0;
    }

    .card button {
      background: green;
      color: white;
      border: none;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 5px;
    }

    /* PAGINATION */
    .pagination {
      text-align: center;
      margin-top: 20px;
    }

    .pagination button {
      margin: 3px;
      padding: 5px 10px;
    }

  </style>
    <style>
        /* DÁN CSS Ở ĐÂY */
    
        .header {
  background: linear-gradient(135deg, #2e7d32, #66bb6a);
  color: white;
}

/* TOP */
.top {
  max-width: 1200px;
  margin: auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
}

/* LEFT */
.left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo {
  height: 120px;
}

.left h1 {
  font-size: 24px;
}

/* RIGHT */
.right {
  display: flex;
  gap: 10px;
  align-items: center;
}

.info {
  background: rgba(255,255,255,0.2);
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 13px;
}

.cart {
  background: #ffeb3b;
  color: black;
  padding: 6px 12px;
  border-radius: 20px;
  font-weight: bold;
}

/* MENU */
.menu {
  display: flex;
  justify-content: center;
  gap: 25px;
  padding: 10px;
  background: rgba(0,0,0,0.1);
}

.menu a {
  color: white;
  text-decoration: none;
  font-weight: 500;
}

.menu a:hover {
  color: #ffeb3b;
}
      </style>
</head>
<body>

    <header class="header">
        <div class="top">
            <div class="left">
              <img src="logo.png" class="logo">
              <h1>Fruit Shop</h1>
            </div>
          
            <div class="right">
              <div class="info">📍 103 Lạc Long Quân, Q11</div>
              <div class="info">📞 0909xxx</div>
              <div class="cart">🛒 0</div>
            </div>
          </div>
      
        
      </header>

<nav>
  <a href="#">Trang chủ</a>
  <a href="#">Giới thiệu</a>
  <a href="#">Sản phẩm</a>
  <a href="#">Khuyến mãi</a>
  <a href="#">Tin tức</a>
</nav>

<div class="section">
  <h2 class="title">Trái cây ngoại</h2>
  <div id="ngoai" class="grid"></div>
</div>

<div class="section">
  <h2 class="title">Trái cây nội</h2>
  <div id="noi" class="grid"></div>
</div>

<div class="pagination" id="pagination"></div>

<script>
let allFruits = []
let currentPage = 1
const perPage = 6

async function loadFruits() {
  const res = await fetch("http://localhost:3000/api/fruits")
  allFruits = await res.json()
  render()
}

function render() {
  document.getElementById("ngoai").innerHTML = ""
  document.getElementById("noi").innerHTML = ""

  const start = (currentPage - 1) * perPage
  const pageData = allFruits.slice(start, start + perPage)

  pageData.forEach(fruit => {
    const card = `
      <div class="card">
        <img src="http://localhost:3000${fruit.image}">
        <h3>${fruit.name}</h3>
        <button onclick="contact()">Liên hệ</button>
      </div>
    `

    if (fruit.category === "ngoai") {
      document.getElementById("ngoai").innerHTML += card
    } else {
      document.getElementById("noi").innerHTML += card
    }
  })

  renderPagination()
}

function renderPagination() {
  const totalPages = Math.ceil(allFruits.length / perPage)
  let html = ""

  for (let i = 1; i <= totalPages; i++) {
    html += `<button onclick="goPage(${i})">${i}</button>`
  }

  document.getElementById("pagination").innerHTML = html
}

function goPage(page) {
  currentPage = page
  render()
}

function contact() {
  alert("Liên hệ: 0909xxx")
}

loadFruits()
</script>

</body>
</html>
