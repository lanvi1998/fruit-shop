<style>
  /* Container search */
  #searchWrapper {
    position: relative;
    width: 300px; /* tuỳ chỉnh */
  }
  
  /* Input */
  #searchInput {
    width: 100%;
    padding: 8px;
    font-size: 16px;
    box-sizing: border-box;
  }
  
  /* Dropdown kết quả */
  #searchResults {
    position: absolute;
    top: 100%; /* ngay dưới input */
    left: 0;
    width: 100%;
    max-height: 200px; /* scroll nếu quá dài */
    overflow-y: auto;
    background: white;
    border: 1px solid #ccc;
    z-index: 9999;
    display: none; /* mặc định ẩn */
  }
  
  /* Item kết quả */
  .search-item {
    padding: 8px;
    cursor: pointer;
  }
  
  .search-item:hover {
    background: #f0f0f0;
  }
  </style>
  
  <div id="searchWrapper">
    <input type="text" id="searchInput" placeholder="Tìm sản phẩm...">
    <div id="searchResults"></div>
  </div>
  
  <script>
  // JS đơn giản
  const searchInput = document.getElementById("searchInput");
  const searchResults = document.getElementById("searchResults");
  
  searchInput.addEventListener("input", async () => {
    const q = searchInput.value.trim();
    if (!q) {
      searchResults.style.display = "none";
      searchResults.innerHTML = "";
      return;
    }
  
    try {
      const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
      const products = await res.json();
  
      if (!products.length) {
        searchResults.innerHTML = "<div class='search-item'>Không tìm thấy</div>";
        searchResults.style.display = "block";
        return;
      }
  
      searchResults.innerHTML = products.map(p =>
        `<div class="search-item">${p.name} - ${p.price.toLocaleString()} VND</div>`
      ).join("");
      searchResults.style.display = "block";
  
    } catch (err) {
      console.error("Search error:", err);
    }
  });
  </script>
